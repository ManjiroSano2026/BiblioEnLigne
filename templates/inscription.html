<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - Nouvelle Bibliothèque</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow-sm p-4">
            <h2 class="text-center mb-4">Inscrire votre Bibliothèque</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/inscription" method="POST">
                <div class="mb-3">
                    <label class="form-label">Nom de la Bibliothèque (ex: Lettres Moderne)</label>
                    <input type="text" name="nom_bibliotheque" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Adresse Email Administrateur</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="mot_de_passe" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Créer l'espace</button>
            </form>
            <hr>
            <p class="text-center mb-0">Déjà inscrit ? <a href="/connexion">Se connecter</a></p>
        </div>
    </div>
</body>
</html>
